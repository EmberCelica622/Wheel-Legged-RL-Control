seed: 42

task:
  capability: slide
  condition: dynamic_command
  complexity: flat
  version: v3
  legacy: false

experiment:
  name: baseline

output:
  root_dir: runs
  run_id: auto

env:
  version: v3
  xml_path: assets/MujocoEnv/two_wheel_legged_robot_slide_flat.xml

sim:
  timestep: 0.002
  control_decimation: 10
  episode_length: 1000
  reset_noise_scale: 0.02

robot:
  base_body: base
  left_wheel_body: left_wheel
  right_wheel_body: right_wheel
  stand_keyframe: stand
  base_linear_velocity_sensor: base_linear_velocity
  base_angular_velocity_sensor: base_angular_velocity
  leg_joints:
    - left_hip_pitch
    - left_knee_pitch
    - right_hip_pitch
    - right_knee_pitch
  wheel_joints:
    - left_wheel_joint
    - right_wheel_joint
  leg_actuators:
    - left_hip_motor
    - left_knee_motor
    - right_hip_motor
    - right_knee_motor
  wheel_actuators:
    - left_wheel_motor
    - right_wheel_motor

control:
  joint_action_scale: [0.35, 0.35, 0.35, 0.35]
  wheel_vel_scale: [25.0, 25.0]
  wheel_vel_bias: [0.0, 0.0]
  leg_kp: [55.0, 55.0, 55.0, 55.0]
  leg_kd: [3.0, 3.0, 3.0, 3.0]
  wheel_kp: [1.2, 1.2]
  leg_torque_limit: [60.0, 60.0, 60.0, 60.0]
  wheel_torque_limit: [25.0, 25.0]
  clip_joint_targets: true

command:
  mode: dynamic_per_episode
  forward_velocity:
    range: [0.0, 1.5]
    max_delta_per_resample: 0.35
    max_rate: 0.5
  yaw_rate:
    range: [-0.5, 0.5]
    max_delta_per_resample: 0.35
    max_rate: 0.35
  resample_interval_s:
    range: [2.0, 4.0]
  initial_command:
    forward_velocity_range: [0.0, 1.0]
    yaw_rate_range: [-0.2, 0.2]

observation:
  clip: 100.0

reward:
  tracking_sigma: 0.35
  yaw_sigma: 0.5
  upright_sigma: 0.25
  target_base_height: 0.62
  weights:
    forward_velocity_tracking: 1.5
    yaw_rate_tracking: 0.4
    upright: 0.5
    base_height_penalty: 2.0
    action_penalty: 0.01
    action_rate_penalty: 0.03
    joint_velocity_penalty: 0.001
    torque_penalty: 0.002
    wheel_longitudinal_offset_penalty: 0.10
  straight_stance:
    enabled: true
    free_longitudinal_offset_m: 0.02
    longitudinal_offset_scale_m: 0.04
    yaw_rate_threshold: 0.05

termination:
  min_base_height: 0.25
  max_roll: 0.75
  max_pitch: 0.75

ppo:
  policy: MlpPolicy
  learning_rate: 0.0001
  batch_size: 256
  n_epochs: 5
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  verbose: 1
  device: cpu
  policy_kwargs:
    net_arch:
      pi: [256, 512, 256]
      vf: [256, 512, 256]

training:
  total_timesteps: 5000000
  n_envs: 8
  rollout_batch_size: 2048
  start_method: spawn
  eval_seed_offset: 2048
  warm_start_checkpoint: null

logging:
  log_interval_steps: 2048
  command_debug: false

callbacks:
  checkpoint_freq: 50000
  eval_freq: 50000
  n_eval_episodes: 20
  deterministic_eval: true

play:
  seed: 42
  deterministic: true
  repeat_same_initial_state: false
  realtime_factor: 1.0
